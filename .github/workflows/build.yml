name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node + npm cache (built-in, no separate cache step needed)
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Java + Gradle cache (built-in via cache: 'gradle')
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      # Gradle build cache for incremental builds
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kilodrop-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # Release build — only runs when keystore secrets are set
      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/kilodrop.jks
          cd android && ./gradlew assembleRelease --build-cache \
            -Pandroid.injected.signing.store.file=$(pwd)/app/kilodrop.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: kilodrop-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
